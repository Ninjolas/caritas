services:
  - type: web
    name: caritas-sistema
    env: python
    region: oregon
    plan: free
    rootDir: caritas
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: caritas-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@caritas.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

databases:
  - name: caritas-db
    databaseName: caritas
    user: caritas_user
    plan: free
